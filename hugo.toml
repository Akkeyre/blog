baseURL = "https://akkeyre.pages.dev/"
languageCode = "en-us"
title = "Akkeyre's Blog"
theme = "hugo-bearcub"

[pagination]
  pagerSize = 10

[params]
  description = "Writing about things I find interesting"
  defaultTheme = "auto"

  [params.author]
    name = "Akkeyre"
    email = ""

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 2

[outputs]
  home = ["HTML", "RSS"]

[markup.highlight]
  style = "github-dark"
  lineNos = false
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
